<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Resolve the theme before first paint so there is no flash of the wrong
         theme. Mirrors getInitialTheme() in src/context/SiteContext.tsx.
         Also preloads the theme-correct hero wallpaper — it's the LCP image, and
         it's applied as a CSS background from JS (see Hero.tsx), so without this
         hint the browser wouldn't discover it until after hydration. Paths must
         stay in sync with the WALLPAPER map in Hero.tsx. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("portfolio-theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = t;
          var link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          link.href = "/images/background/" + t + "-wallpaper.jpg";
          link.fetchPriority = "high";
          document.head.appendChild(link);
        } catch (e) {
          /* localStorage/matchMedia unavailable — fall back to the light default */
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guilherme Rezende's Portfolio</title>
    <meta
      name="description"
      content="Guilherme Rezende — Software Developer (React/TypeScript). Open to front-end and full-stack internship opportunities."
    />

    <!-- Social sharing (Open Graph + Twitter). The site's primary distribution
         is a shared link, so these drive the preview card on LinkedIn, WhatsApp,
         Slack, X, etc. og:image must be an absolute HTTPS URL (1200×630). Keep
         the copy in sync with <title> / <meta name="description"> above. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.guilhermerezende.dev.br/" />
    <meta property="og:title" content="Guilherme Rezende — Software Developer" />
    <meta
      property="og:description"
      content="Guilherme Rezende — Software Developer (React/TypeScript). Open to front-end and full-stack internship opportunities."
    />
    <meta
      property="og:image"
      content="https://www.guilhermerezende.dev.br/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Guilherme Rezende — Software Developer · React & TypeScript"
    />
    <meta property="og:site_name" content="Guilherme Rezende" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Guilherme Rezende — Software Developer" />
    <meta
      name="twitter:description"
      content="Guilherme Rezende — Software Developer (React/TypeScript). Open to front-end and full-stack internship opportunities."
    />
    <meta
      name="twitter:image"
      content="https://www.guilhermerezende.dev.br/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Guilherme Rezende — Software Developer · React & TypeScript"
    />

    <!-- Fonts are self-hosted via @fontsource (imported in src/main.tsx) so the
         page no longer makes a render-blocking round-trip to Google Fonts. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
